# ============================================================================
# betbobmobile 前端部署 nginx 配置(前端 + 后端同域名部署)
# ----------------------------------------------------------------------------
# 适用场景:前端 SPA 与后端(Go 服务)部署在同一个域名下,例如 devops.8888880.vip
#   - API   : https://<域名>/api/*      -> 后端
#   - 图片   : https://<域名>/static/image/*  -> 后端(完整图集,含游戏商 logo)
#            https://<域名>/images/*     -> 后端(轮播/上传类图)
#   - 前端   : 其余路径 -> vite 构建产物 dist/(SPA,hash 路由)
#
# 同域部署下前端无需改任何代码:API 绝对地址即同源,图片同源由后端提供,免 CORS。
#
# 部署步骤:
#   1) npm run build                 # 产出 dist/(Node 22 直接跑,无需 openssl hack)
#   2) 将 dist/ 上传到服务器,例如 /var/www/betbob/dist
#   3) 按下方 ← 标注修改 upstream 地址、root 路径、server_name
#   4) nginx -t && nginx -s reload   # 校验并重载
#
# 若 devops 上已有 nginx 在转发 /api、/static/image:不要整段替换,
# 只需把 root、缓存 location、以及 SPA 的 `location /` 合并进现有 server 块即可。
# ============================================================================

# 后端 Go 服务地址(改成你后端实际监听的 IP:端口)
upstream bob_backend {
    server 127.0.0.1:8080;        # ← 改成你的后端服务地址:端口
}

server {
    listen       80;
    server_name  devops.8888880.vip;   # ← 你的域名

    # 前端 vite 构建产物目录
    root   /var/www/betbob/dist;       # ← npm run build 产出的 dist 绝对路径
    index  index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # ---- 后端接口 ----
    location ^~ /api/ {
        proxy_pass http://bob_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- 图片:后端有完整图集(游戏商 logo / UI 图),交给后端 ----
    location ^~ /static/image/ {
        proxy_pass http://bob_backend;
        proxy_set_header Host $host;
    }

    # ---- 轮播 / 上传类图 ----
    location ^~ /images/ {
        proxy_pass http://bob_backend;
        proxy_set_header Host $host;
    }

    # ---- 前端构建资源(js/css/字体,带 hash 指纹)强缓存,走本地 dist ----
    # 注意:上面的 ^~ 前缀优先级高于此正则,/static/image 等不会落到这里。
    location ~* \.(?:js|css|woff2?|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- SPA:hash 路由,一切回退 index.html ----
    # /static/js、/static/style 等前端本地文件也在这里由 try_files 命中。
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ============================================================================
# 启用 HTTPS(推荐,后端已是 https):把上面的 server 块改成如下监听,
# 并另加一个 80 -> 443 跳转。证书用你现有的即可。
# ----------------------------------------------------------------------------
# server {
#     listen 443 ssl http2;
#     server_name devops.8888880.vip;
#     ssl_certificate     /etc/nginx/ssl/your.crt;   # ← 你的证书
#     ssl_certificate_key /etc/nginx/ssl/your.key;   # ← 你的私钥
#     ...（其余 location 同上）
# }
# server {
#     listen 80;
#     server_name devops.8888880.vip;
#     return 301 https://$host$request_uri;
# }
# ============================================================================
