name: Build & Deploy

# 手动触发:GitHub 仓库 → Actions → 左侧选 "Build & Deploy" → 右上 "Run workflow" 点击运行
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (vite)
        run: npm run build

      - name: Deploy dist to server (tar over SSH)
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}   # 私钥内容(Secret)
          HOST:    ${{ vars.DEPLOY_HOST }}         # 服务器 IP(Variable)
          USER:    ${{ vars.DEPLOY_USER }}         # SSH 用户(Variable)
          TARGET:  ${{ vars.DEPLOY_PATH }}         # 部署目录 / 前端 web 根(Variable)
        run: |
          set -eo pipefail
          # 变量为空时立即失败,避免误操作
          : "${HOST:?DEPLOY_HOST 未设置}"
          : "${USER:?DEPLOY_USER 未设置}"
          : "${TARGET:?DEPLOY_PATH 未设置}"

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          SSH_OPTS="-i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no"

          # 服务器无需安装 rsync,只需自带 tar(几乎所有 Linux 都有)。
          # 打包 dist/ 内容 -> 经 SSH 传输 -> 服务器解压到 TARGET(覆盖式,不删旧文件)。
          tar czf - -C dist . \
            | ssh $SSH_OPTS "$USER@$HOST" "mkdir -p '$TARGET' && tar xzf - -C '$TARGET'"

          echo "✅ 已部署到 $USER@$HOST:$TARGET"
